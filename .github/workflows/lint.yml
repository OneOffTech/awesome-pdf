name: Lint

on:
  push:
    paths:
      - '**.md'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Check readme follow conventions
      run: npx awesome-lint@2.3.0 ./README.md

    
